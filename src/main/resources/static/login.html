<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --blue: #2563eb;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(15,23,42,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-icon img { width: 28px; height: 28px; object-fit: contain; }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 24px;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        h2 { margin-bottom: 8px; font-weight: 700; font-size: 20px; }
        p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

        .form-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            outline: none;
            transition: all .2s;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--blue);
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background .2s;
            margin-top: 10px;
        }

        button:hover { background: #1d4ed8; }

        .footer { margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
        .footer a { color: var(--blue); text-decoration: none; font-weight: 600; }

        #error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <div class="logo-icon">
            <img src="/icon.png" alt="Nexus Logo">
        </div>
        <div class="logo-text">Nexus</div>
    </div>

    <h2>Welcome Back</h2>
    <p>Please enter your credentials to login</p>

    <div id="error-msg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="#">Contact Admin</a>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(window.location.origin + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('nexus_token', data.token);
                
                // Save correct user info from Backend
                localStorage.setItem('nexus_user', JSON.stringify({
                    fullName: data.fullName,
                    email: data.email,
                    role: data.role
                }));
                
                window.location.href = 'index.html';
            } else {
                const err = await response.json();
                errorMsg.textContent = err.message || 'Invalid email or password';
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent = 'Connection error. Is the server running?';
            errorMsg.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
        }
    });
</script>

</body>
</html>
