spring.application.name=Nexus Smart Home

# Render automatically sets PORT environment variable
server.port=${PORT:8081}

# Database Settings from Environment Variables
# Nhập các biến này từ thông tin kết nối của Aiven (Host, Port, User, Password)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME:defaultdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
# 'update' để tự tạo bảng nếu chưa có
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Tắt log SQL trên production để dọn dẹp log
spring.jpa.show-sql=false

# JWT Configuration (Using env var for security)
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
jwt.expiration=86400000
